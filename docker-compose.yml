version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowforge
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-flowforge-db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flowforge_network

  backend:
    build: .
    container_name: flowforge_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-flowforge}:${POSTGRES_PASSWORD:-flowforge}@postgres:5432/${POSTGRES_DB:-flowforge}
    depends_on:
      - postgres
    networks:
      - flowforge_network

  frontend:
    build: ./frontend
    container_name: flowforge_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://flowforge_backend:8000
    depends_on:
      - backend
    networks:
      - flowforge_network

networks:
  flowforge_network:
    driver: bridge

volumes:
  postgres_data: