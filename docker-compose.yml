version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowforge
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB: flowforgedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flowforge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: flowforge_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flowforge_network
    env_file:
      - .env.docker
    command: sh -c "alembic -c alembic.docker.ini upgrade head && python main.py"

  frontend:
    build: ./frontend
    container_name: flowforge_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://flowforge_backend:8000
    depends_on:
      - backend
    networks:
      - flowforge_network

networks:
  flowforge_network:
    driver: bridge

volumes:
  postgres_data: